spring:
  application:
    name: tlias-web-management

  datasource:
    url: jdbc:mysql://localhost:3306/tlias
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB        # 单个文件最大大小
      max-request-size: 100MB    # 单次请求最大大小

  # 静态资源映射：将 /uploads/** 映射到本地 uploads 目录
  web:
    resources:
      static-locations: classpath:/static,classpath:/public,file:uploads/

# 自定义上传路径配置
upload:
  path: uploads/

# 阿里云OSS配置
aliyun:
  oss:
    endpoint: https://oss-cn-beijing.aliyuncs.com  # 地域节点
    accessKeyId: ${OSS_ACCESS_KEY_ID}              # 从环境变量获取
    accessKeySecret: ${OSS_ACCESS_KEY_SECRET}      # 从环境变量获取
    bucketName: java-hytrix                        # Bucket名称
    region: cn-beijing                             # 地域

mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    #开启驼峰命名映射开关
    map-underscore-to-camel-case: true

logging:
  level:
    org.springframework,jdbc.support.JdbcTransactionManger: debug